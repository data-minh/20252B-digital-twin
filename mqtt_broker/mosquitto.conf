listener 1883
allow_anonymous false
password_file /mosquitto/config/passwords
acl_file /mosquitto/config/aclfile
persistence false
log_dest stdout
log_type all
connection_messages true
per_listener_settings false

# TLS listener for secure MQTT (MQTTS)
listener 8883
# CA certificate used to validate client/server certs (optional for one-way TLS)
cafile /mosquitto/certs/ca.crt
# Server cert/key for the broker
certfile /mosquitto/certs/server.crt
keyfile /mosquitto/certs/server.key
# Set to true to require client certificates (mTLS)
require_certificate false
# TLS version
tls_version tlsv1.2
